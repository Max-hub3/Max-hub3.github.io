<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon — Max</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #04040a;
      --deep: #0a0a14;
      --grey-mid: #4a4a5a;
      --grey-light: #2a2a38;
      --white: #e8e6f0;
      --accent: #9090b0;
      --glow: rgba(140,130,200,0.15);
      --display: 'Cinzel', serif;
      --mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--black); color: var(--white); font-family: var(--mono); overflow: hidden; }

    /* DEEP SPACE BACKGROUND */
    #bg { position: fixed; inset: 0; z-index: 0; }

    /* SNOW */
    #snow { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* RADIAL GLOW CENTER */
    .center-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(80,70,140,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
      animation: glowBreath 5s ease-in-out infinite;
    }
    @keyframes glowBreath {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* VIGNETTE */
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(4,4,10,0.95) 100%);
    }

    /* BACK BUTTON */
    .back-btn {
      position: fixed;
      top: 1.6rem; left: 1.8rem;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-mid);
      text-decoration: none;
      border: 1px solid var(--grey-light);
      padding: 0.45rem 1rem;
      border-radius: 2px;
      transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.2s forwards;
    }
    .back-btn:hover {
      color: var(--white);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(140,130,200,0.2);
    }
    .back-btn svg { transition: transform 0.2s; }
    .back-btn:hover svg { transform: translateX(-3px); }

    /* CORNERS */
    .corner {
      position: fixed;
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-light);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.4s forwards;
    }
    .corner.tr { top: 1.6rem; right: 1.8rem; }
    .corner.bl { bottom: 1.6rem; left: 1.8rem; }
    .corner.br { bottom: 1.6rem; right: 1.8rem; }
    #clock { color: var(--grey-mid); }

    /* HORIZONTAL LINES */
    .line-top, .line-bottom {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--grey-light), transparent);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 0.8s forwards;
    }
    .line-top { top: 4rem; }
    .line-bottom { bottom: 4rem; }

    /* MAIN */
    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* EYE / SYMBOL */
    .symbol {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.4s forwards, symbolFloat 4s ease-in-out 1.4s infinite;
      filter: drop-shadow(0 0 12px rgba(140,130,200,0.5));
    }
    @keyframes symbolFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* EYEBROW */
    .eyebrow {
      font-size: 0.58rem;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.55s forwards;
    }

    /* TITLE */
    .title-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(3.5rem, 11vw, 10rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.08em;
      color: var(--white);
      text-shadow:
        0 0 30px rgba(140,130,200,0.4),
        0 0 80px rgba(140,130,200,0.15);
      opacity: 0;
      animation: fadeUp 1s ease 0.7s forwards;
    }

    h2 {
      font-family: var(--display);
      font-size: clamp(3.5rem, 11vw, 10rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.16em;
      color: transparent;
      -webkit-text-stroke: 1px var(--grey-mid);
      opacity: 0;
      animation: fadeUp 1s ease 0.85s forwards;
    }

    /* ORNAMENT LINE */
    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0;
      opacity: 0;
      animation: fadeIn 1s ease 1s forwards;
    }
    .ornament-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--grey-mid));
    }
    .ornament-line.right {
      background: linear-gradient(90deg, var(--grey-mid), transparent);
    }
    .ornament-diamond {
      width: 5px; height: 5px;
      background: var(--accent);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--accent);
    }

    /* SUBTITLE */
    .subtitle {
      font-size: 0.75rem;
      color: var(--grey-mid);
      letter-spacing: 0.08em;
      max-width: 360px;
      line-height: 2;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.1s forwards;
    }

    /* MYSTERY DOTS */
    .mystery-row {
      display: flex;
      gap: 1.2rem;
      margin-top: 2.4rem;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.3s forwards;
    }
    .m-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--grey-mid);
      animation: mDotPulse 2.4s ease-in-out infinite;
    }
    .m-dot:nth-child(1) { animation-delay: 0s; }
    .m-dot:nth-child(2) { animation-delay: 0.4s; }
    .m-dot:nth-child(3) { animation-delay: 0.8s; }
    .m-dot:nth-child(4) { animation-delay: 1.2s; }
    .m-dot:nth-child(5) { animation-delay: 1.6s; }
    @keyframes mDotPulse {
      0%, 100% { background: var(--grey-light); transform: scale(1); }
      50%       { background: var(--accent); transform: scale(2); box-shadow: 0 0 6px var(--accent); }
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <canvas id="snow"></canvas>
  <div class="center-glow"></div>
  <div class="vignette"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <a href="index.html" class="back-btn">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path d="M7 1L2 5.5l5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </a>

  <span class="corner tr" id="clock">--:--:--</span>
  <span class="corner bl">Max — Coming Soon</span>
  <span class="corner br">◈ Unknown date</span>

  <main>
    <div class="symbol">◈</div>
    <div class="eyebrow">Something is coming</div>

    <div class="title-wrap">
      <h1>COMING</h1>
      <h2>SOON</h2>
    </div>

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <p class="subtitle">
      A new project is taking shape in the dark.<br/>
      Details will be revealed when the time comes.
    </p>

    <div class="mystery-row">
      <div class="m-dot"></div>
      <div class="m-dot"></div>
      <div class="m-dot"></div>
      <div class="m-dot"></div>
      <div class="m-dot"></div>
    </div>
  </main>

  <script>
    // Stars background
    const bg = document.getElementById('bg');
    const bgCtx = bg.getContext('2d');
    let bW, bH, stars = [];

    function resizeBg() {
      bW = bg.width  = window.innerWidth;
      bH = bg.height = window.innerHeight;
    }
    resizeBg();
    window.addEventListener('resize', resizeBg);

    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 0.8 + 0.1,
        opacity: Math.random() * 0.5 + 0.1,
        twinkle: Math.random() * Math.PI * 2
      });
    }

    function drawStars() {
      bgCtx.clearRect(0, 0, bW, bH);
      stars.forEach(s => {
        s.twinkle += 0.015;
        const op = s.opacity * (0.6 + 0.4 * Math.sin(s.twinkle));
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(200,198,220,${op})`;
        bgCtx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // Snow
    const sc = document.getElementById('snow');
    const sctx = sc.getContext('2d');
    let W, H, flakes = [];
    function resizeSnow() { W = sc.width = window.innerWidth; H = sc.height = window.innerHeight; }
    resizeSnow();
    window.addEventListener('resize', resizeSnow);
    for (let i = 0; i < 60; i++) flakes.push({
      x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.2, speed: Math.random() * 0.4 + 0.15,
      drift: (Math.random() - 0.5) * 0.25, opacity: Math.random() * 0.2 + 0.04
    });
    function drawSnow() {
      sctx.clearRect(0, 0, W, H);
      flakes.forEach(f => {
        sctx.beginPath(); sctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        sctx.fillStyle = `rgba(180,178,200,${f.opacity})`; sctx.fill();
        f.y += f.speed; f.x += f.drift;
        if (f.y > H) { f.y = -5; f.x = Math.random() * W; }
        if (f.x > W) f.x = 0; if (f.x < 0) f.x = W;
      });
      requestAnimationFrame(drawSnow);
    }
    drawSnow();

    // Clock UK
    function tick() {
      const now = new Date();
      const timeStr = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Europe/London',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(now);
      document.getElementById('clock').textContent = timeStr + ' UK';
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
