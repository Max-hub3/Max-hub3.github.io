<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance — Max</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0d0d0c;
      --grey-dark: #1a1a19;
      --grey-mid: #6b6b69;
      --grey-light: #2e2e2c;
      --white: #f0efed;
      --accent: #c8c6c2;
      --serif: 'Playfair Display', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* VIGNETTE */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* SNOW */
    #snow { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* MAIN */
    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* TOP TAG */
    .tag {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--grey-mid);
      border: 1px solid var(--grey-light);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s forwards;
    }

    /* GEAR RING */
    .gear-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.4s forwards;
    }

    .gear-outer {
      position: absolute;
      inset: 0;
      border: 1px solid var(--grey-light);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spinSlow 6s linear infinite;
    }
    .gear-inner {
      position: absolute;
      inset: 16px;
      border: 1px solid var(--grey-light);
      border-radius: 50%;
      border-bottom-color: var(--accent);
      animation: spinSlow 4s linear infinite reverse;
    }
    .gear-center {
      position: absolute;
      inset: 38px;
      background: var(--grey-light);
      border-radius: 50%;
    }

    @keyframes spinSlow { to { transform: rotate(360deg); } }

    /* TITLE */
    .h1-wrap {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.9s ease 0.5s forwards;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      text-shadow:
        0 0 15px #fff,
        0 0 50px #fff,
        0 0 100px #fff,
        0 0 200px rgba(255,255,255,0.8),
        0 0 350px rgba(255,255,255,0.5);
    }
    h1 em { font-style: italic; color: var(--accent); }

    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          0 0 10px #fff,
          0 0 40px #fff,
          0 0 80px #fff,
          0 0 160px rgba(255,255,255,0.6);
      }
      50% {
        text-shadow:
          0 0 20px #fff,
          0 0 70px #fff,
          0 0 150px #fff,
          0 0 300px rgba(255,255,255,0.95),
          0 0 420px rgba(255,255,255,0.5);
      }
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--grey-mid);
      max-width: 400px;
      line-height: 1.9;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.65s forwards;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      width: 280px;
      height: 2px;
      background: var(--grey-light);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      animation: progress 4s ease-in-out infinite alternate;
    }
    @keyframes progress {
      from { width: 15%; }
      to   { width: 85%; }
    }

    /* COUNTDOWN */
    #countdown-wrap {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
      text-align: center;
    }
    .countdown-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin-bottom: 0.8rem;
    }
    #countdown-display {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: center;
    }
    .cd-block {
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
    }
    .cd-block span:first-child {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      min-width: 2.4rem;
      text-align: center;
    }
    .cd-unit {
      font-size: 0.62rem !important;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-mid) !important;
      font-family: var(--mono) !important;
      font-weight: 400 !important;
    }
    .cd-sep {
      font-family: var(--serif);
      font-size: 2rem;
      color: var(--grey-light);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    /* BACK LINK */
    .back-link {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--grey-light);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.95s forwards;
    }
    .back-link:hover { color: var(--white); border-color: var(--white); }

    /* CORNER LABELS */
    .corner {
      position: fixed;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-light);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }
    .corner.tl { top: 1.4rem; left: 1.8rem; }
    .corner.tr { top: 1.4rem; right: 1.8rem; }
    .corner.bl { bottom: 1.4rem; left: 1.8rem; }
    .corner.br { bottom: 1.4rem; right: 1.8rem; }

    /* CLOCK */
    #clock { color: var(--grey-mid); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="snow"></canvas>

  <span class="corner tl">max.dev</span>
  <span class="corner tr" id="clock">--:--:--</span>
  <span class="corner bl">Status — Maintenance</span>
  <span class="corner br">Please wait</span>

  <main>
    <div class="tag">⚙ Scheduled Maintenance</div>

    <div class="gear-wrap">
      <div class="gear-outer"></div>
      <div class="gear-inner"></div>
      <div class="gear-center"></div>
    </div>

    <div class="h1-wrap">
      <h1>Back <em>soon.</em></h1>
    </div>
    <p class="subtitle">
      I'm currently working on some updates and improvements.<br/>
      The site will be back up shortly — thanks for your patience!
    </p>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div id="countdown-wrap">
      <div class="countdown-label">Back online in</div>
      <div id="countdown-display">
        <div class="cd-block"><span id="cd-h">00</span><span class="cd-unit">h</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><span id="cd-m">00</span><span class="cd-unit">m</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><span id="cd-s">00</span><span class="cd-unit">s</span></div>
      </div>
    </div>

    <a href="https://discord.gg/XaZSGVFvzV" target="_blank" class="back-link">Join Discord for updates</a>
  </main>

  <script>
    // Snow
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let W, H, flakes = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 80; i++) flakes.push({
      x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
      r: Math.random() * 2 + 0.4, speed: Math.random() * 0.6 + 0.2,
      drift: (Math.random() - 0.5) * 0.3, opacity: Math.random() * 0.4 + 0.1
    });
    function drawSnow() {
      ctx.clearRect(0, 0, W, H);
      flakes.forEach(f => {
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,198,194,${f.opacity})`; ctx.fill();
        f.y += f.speed; f.x += f.drift;
        if (f.y > H) { f.y = -5; f.x = Math.random() * W; }
        if (f.x > W) f.x = 0; if (f.x < 0) f.x = W;
      });
      requestAnimationFrame(drawSnow);
    }
    drawSnow();

    // Clock UK
    function tick() {
      const now = new Date();
      const uk = new Date(now.toLocaleString('en-GB', { timeZone: 'Europe/London' }));
      const pad = n => String(n).padStart(2,'0');
      document.getElementById('clock').textContent = `${pad(uk.getHours())}:${pad(uk.getMinutes())}:${pad(uk.getSeconds())} UK`;
    }
    tick(); setInterval(tick, 1000);

    // Countdown to 01:00 Berlin time next occurrence
    function updateCountdown() {
      const now = new Date();
      // Get current Berlin time
      const berlinNow = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Berlin' }));

      // Build target: today at 01:00 Berlin
      const target = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Berlin' }));
      target.setHours(1, 0, 0, 0);

      // If 01:00 already passed today, aim for tomorrow
      if (berlinNow >= target) {
        target.setDate(target.getDate() + 1);
      }

      // Diff in ms (comparing UTC internally)
      const diff = target - now + (target.getTimezoneOffset() - now.getTimezoneOffset()) * 60000;
      const totalSec = Math.max(0, Math.floor(diff / 1000));
      const hh = Math.floor(totalSec / 3600);
      const mm = Math.floor((totalSec % 3600) / 60);
      const ss = totalSec % 60;
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('cd-h').textContent = pad(hh);
      document.getElementById('cd-m').textContent = pad(mm);
      document.getElementById('cd-s').textContent = pad(ss);
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
