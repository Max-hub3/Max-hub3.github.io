<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — Max</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0d0d0c;
      --grey-dark: #1a1a19;
      --grey-mid: #6b6b69;
      --grey-light: #2e2e2c;
      --white: #f0efed;
      --accent: #888784;
      --serif: 'Playfair Display', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* DOT GRID BACKGROUND */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 36px 36px;
      z-index: 0;
    }

    /* VIGNETTE */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.9) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* SNOW */
    #snow { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* SCANLINES */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
    }

    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* TAG */
    .tag {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--grey-mid);
      border: 1px solid var(--grey-light);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s forwards;
    }

    /* SIGNAL ICON */
    .signal-wrap {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.4s forwards;
    }

    .signal-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      justify-content: center;
      height: 50px;
    }

    .bar {
      width: 10px;
      border-radius: 3px 3px 0 0;
      background: var(--grey-light);
      animation: barPulse 2s ease-in-out infinite;
    }
    .bar:nth-child(1) { height: 14px; animation-delay: 0s; }
    .bar:nth-child(2) { height: 24px; animation-delay: 0.15s; }
    .bar:nth-child(3) { height: 34px; animation-delay: 0.3s; }
    .bar:nth-child(4) { height: 46px; animation-delay: 0.45s; background: var(--grey-mid); opacity: 0.3; }

    @keyframes barPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* STATUS DOT */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.45s forwards;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--grey-mid);
      animation: blink 1.4s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .status-text {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
    }

    /* TITLE */
    .h1-wrap {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.9s ease 0.55s forwards;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      text-shadow:
        0 0 15px #fff,
        0 0 50px #fff,
        0 0 100px #fff,
        0 0 200px rgba(255,255,255,0.8),
        0 0 350px rgba(255,255,255,0.5);
    }
    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      font-size: 0.85rem;
      color: var(--grey-mid);
      max-width: 400px;
      line-height: 1.9;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.7s forwards;
    }

    /* COUNTDOWN */
    #countdown-wrap {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.9s forwards;
      text-align: center;
    }
    .countdown-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey-mid);
      margin-bottom: 0.8rem;
    }
    #countdown-display {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      justify-content: center;
    }
    .cd-block {
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
    }
    .cd-block span:first-child {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      min-width: 2.4rem;
      text-align: center;
    }
    .cd-unit {
      font-size: 0.62rem !important;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-mid) !important;
      font-family: var(--mono) !important;
      font-weight: 400 !important;
    }
    .cd-sep {
      font-family: var(--serif);
      font-size: 2rem;
      color: var(--grey-light);
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    #refresh-msg {
      display: none;
      font-family: var(--serif);
      font-size: 1.8rem;
      font-style: italic;
      font-weight: 700;
      color: var(--white);
      text-shadow: 0 0 15px #fff, 0 0 40px #fff, 0 0 80px rgba(255,255,255,0.6);
      cursor: pointer;
      animation: refreshPulse 1s ease-in-out infinite;
    }
    #refresh-msg:hover { opacity: 0.8; }
    @keyframes refreshPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    /* LINKS */
    .link-row {
      display: flex;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.85s forwards;
    }
    .link-row a {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--grey-light);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .link-row a:hover { color: var(--white); border-color: var(--white); }

    /* CORNERS */
    .corner {
      position: fixed;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-light);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }
    .corner.tl { top: 1.4rem; left: 1.8rem; }
    .corner.tr { top: 1.4rem; right: 1.8rem; }
    .corner.bl { bottom: 1.4rem; left: 1.8rem; }
    .corner.br { bottom: 1.4rem; right: 1.8rem; }
    #clock { color: var(--grey-light); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="snow"></canvas>
  <div class="scanlines"></div>

  <span class="corner tl">max.dev</span>
  <span class="corner tr" id="clock">--:--:--</span>
  <span class="corner bl">Status — Offline</span>
  <span class="corner br">No signal</span>

  <main>
    <div class="tag">⚫ Currently Offline</div>

    <div class="signal-wrap">
      <div class="signal-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>

    <div class="status-row">
      <div class="dot"></div>
      <span class="status-text">No connection detected</span>
    </div>

    <div class="h1-wrap">
      <h1>I'm <em>offline.</em></h1>
    </div>
    <p class="subtitle">
      Max is currently offline and will be back soon.<br/>
      Join the Discord to stay updated or check back later!
    </p>

    <div id="countdown-wrap">
      <div class="countdown-label" id="cd-label">Back online in</div>
      <div id="countdown-display">
        <div class="cd-block"><span id="cd-h">00</span><span class="cd-unit">h</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><span id="cd-m">00</span><span class="cd-unit">m</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><span id="cd-s">00</span><span class="cd-unit">s</span></div>
      </div>
      <div id="refresh-msg">↻ REFRESH PAGE!</div>
    </div>

    <div class="link-row">
      <a href="https://discord.gg/XaZSGVFvzV" target="_blank">Cmdr Discord</a>
      <a href="https://discord.gg/SkHmpbVYzw" target="_blank">Nova Discord</a>
    </div>
  </main>

  <script>
    // Snow
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');
    let W, H, flakes = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 80; i++) flakes.push({
      x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
      r: Math.random() * 2 + 0.4, speed: Math.random() * 0.6 + 0.2,
      drift: (Math.random() - 0.5) * 0.3, opacity: Math.random() * 0.35 + 0.08
    });
    function drawSnow() {
      ctx.clearRect(0, 0, W, H);
      flakes.forEach(f => {
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,178,174,${f.opacity})`; ctx.fill();
        f.y += f.speed; f.x += f.drift;
        if (f.y > H) { f.y = -5; f.x = Math.random() * W; }
        if (f.x > W) f.x = 0; if (f.x < 0) f.x = W;
      });
      requestAnimationFrame(drawSnow);
    }
    drawSnow();

    // Clock UK
    function tick() {
      const now = new Date();
      const uk = new Date(now.toLocaleString('en-GB', { timeZone: 'Europe/London' }));
      const pad = n => String(n).padStart(2,'0');
      document.getElementById('clock').textContent = `${pad(uk.getHours())}:${pad(uk.getMinutes())}:${pad(uk.getSeconds())} UK`;
    }
    tick(); setInterval(tick, 1000);

    // Countdown — reads end time from URL param ?end=HH:MM or falls back to 00:50
    function getEndTime() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('end');
      if (raw) {
        const parts = raw.split(':');
        if (parts.length === 2) return { h: parseInt(parts[0]), m: parseInt(parts[1]) };
      }
      return { h: 0, m: 50 }; // fallback
    }

    function updateCountdown() {
      const end = getEndTime();
      const now = new Date();
      const berlin = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Berlin' }));

      const target = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Berlin' }));
      target.setHours(end.h, end.m, 0, 0);
      if (berlin >= target) target.setDate(target.getDate() + 1);

      const diff = target - now + (target.getTimezoneOffset() - now.getTimezoneOffset()) * 60000;
      const totalSec = Math.max(0, Math.floor(diff / 1000));

      if (totalSec <= 0) {
        // Show REFRESH PAGE
        document.getElementById('countdown-display').style.display = 'none';
        document.getElementById('cd-label').style.display = 'none';
        document.getElementById('refresh-msg').style.display = 'block';
        return;
      }

      const pad = n => String(n).padStart(2, '0');
      document.getElementById('cd-h').textContent = pad(Math.floor(totalSec / 3600));
      document.getElementById('cd-m').textContent = pad(Math.floor((totalSec % 3600) / 60));
      document.getElementById('cd-s').textContent = pad(totalSec % 60);
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Click REFRESH PAGE to reload
    document.getElementById('refresh-msg').addEventListener('click', () => {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
