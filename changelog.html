<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Changelog — Max</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #04040a;
      --grey-dark: #0e0e18;
      --grey-mid: #4a4a5a;
      --grey-light: #2a2a38;
      --white: #e8e6f0;
      --accent: #9090b0;
      --display: 'Cinzel', serif;
      --serif: 'Playfair Display', serif;
      --mono: 'DM Mono', monospace;

      /* TAG COLORS */
      --new:         #4a9e6a;
      --new-bg:      rgba(74,158,106,0.08);
      --changed:     #7a8ecc;
      --changed-bg:  rgba(122,142,204,0.08);
      --maintenance: #c8a04a;
      --maintenance-bg: rgba(200,160,74,0.08);
      --offline:     #888;
      --offline-bg:  rgba(136,136,136,0.08);
      --removed:     #b05a5a;
      --removed-bg:  rgba(176,90,90,0.08);
      --security:    #cc6a8a;
      --security-bg: rgba(204,106,138,0.08);
    }

    html, body { min-height: 100%; background: var(--black); color: var(--white); font-family: var(--mono); }

    /* CANVAS */
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(4,4,10,0.92) 100%);
    }

    /* BACK BUTTON */
    .back-btn {
      position: fixed; top: 1.6rem; left: 1.8rem; z-index: 50;
      display: flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--grey-mid); text-decoration: none;
      border: 1px solid var(--grey-light); padding: 0.45rem 1rem; border-radius: 2px;
      transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .back-btn:hover { color: var(--white); border-color: var(--accent); box-shadow: 0 0 12px rgba(140,130,200,0.2); }
    .back-btn svg { transition: transform 0.2s; }
    .back-btn:hover svg { transform: translateX(-3px); }

    /* CORNERS */
    .corner {
      position: fixed; font-size: 0.55rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--grey-light); z-index: 10;
    }
    .corner.tr { top: 1.6rem; right: 1.8rem; }
    .corner.bl { bottom: 1.6rem; left: 1.8rem; }
    #clock { color: var(--grey-mid); }

    .line-top {
      position: fixed; top: 4rem; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--grey-light), transparent);
      z-index: 10;
    }

    /* PAGE */
    .page {
      position: relative; z-index: 10;
      max-width: 720px; margin: 0 auto;
      padding: 8rem 2rem 6rem;
    }

    /* HEADER */
    .page-tag {
      font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--grey-mid); margin-bottom: 1.2rem;
    }
    .page-title {
      font-family: var(--display);
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 700; letter-spacing: 0.06em;
      color: var(--white);
      text-shadow: 0 0 40px rgba(140,130,200,0.25);
      margin-bottom: 0.5rem;
    }
    .page-sub {
      font-size: 0.7rem; color: var(--grey-mid);
      letter-spacing: 0.06em; margin-bottom: 3.5rem;
    }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 3rem;
    }
    .divider-line { flex: 1; height: 1px; background: var(--grey-light); }
    .divider-diamond { width: 5px; height: 5px; background: var(--accent); transform: rotate(45deg); box-shadow: 0 0 6px var(--accent); }

    /* ENTRIES */
    .entries { display: flex; flex-direction: column; gap: 0; }

    .entry {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 0 2rem;
      padding: 1.6rem 0;
      border-bottom: 1px solid var(--grey-light);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .entry:first-child { border-top: 1px solid var(--grey-light); }

    /* DATE COL */
    .entry-date {
      font-size: 0.6rem; letter-spacing: 0.1em;
      color: var(--grey-mid); padding-top: 0.15rem;
      line-height: 1.8;
    }
    .entry-date .day { font-size: 0.55rem; }

    /* CONTENT COL */
    .entry-content { display: flex; flex-direction: column; gap: 0.5rem; }

    .entry-tag {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.55rem; letter-spacing: 0.16em; text-transform: uppercase;
      padding: 0.2rem 0.7rem; border-radius: 2px;
      width: fit-content; font-weight: 400;
    }
    .entry-tag.new         { color: var(--new);         background: var(--new-bg);         border: 1px solid rgba(74,158,106,0.2); }
    .entry-tag.changed     { color: var(--changed);     background: var(--changed-bg);     border: 1px solid rgba(122,142,204,0.2); }
    .entry-tag.maintenance { color: var(--maintenance); background: var(--maintenance-bg); border: 1px solid rgba(200,160,74,0.2); }
    .entry-tag.offline     { color: var(--offline);     background: var(--offline-bg);     border: 1px solid rgba(136,136,136,0.2); }
    .entry-tag.removed     { color: var(--removed);     background: var(--removed-bg);     border: 1px solid rgba(176,90,90,0.2); }
    .entry-tag.security    { color: var(--security);    background: var(--security-bg);    border: 1px solid rgba(204,106,138,0.2); }

    .entry-title {
      font-family: var(--serif);
      font-size: 1rem; font-weight: 700;
      color: var(--white); line-height: 1.3;
    }
    .entry-desc {
      font-size: 0.7rem; color: var(--grey-mid);
      line-height: 1.9; letter-spacing: 0.02em;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="vignette"></div>
  <div class="line-top"></div>

  <a href="index.html" class="back-btn">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path d="M7 1L2 5.5l5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </a>

  <span class="corner tr" id="clock">--:--:--</span>
  <span class="corner bl">Max — Changelog</span>

  <div class="page">
    <div class="page-tag">◈ Version history</div>
    <div class="page-title">Changelog</div>
    <div class="page-sub">All updates, changes and events — newest first.</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="entries" id="entries"></div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════
    // 📋 CHANGELOG EINTRÄGE — Hier kannst du alles bearbeiten
    //
    // Types: "new" | "changed" | "maintenance" | "offline" | "removed" | "security"
    //
    // Format:
    // {
    //   date: "07 Mar 2026",   ← Datum anzeigen
    //   type: "new",           ← Typ (Farbe des Tags)
    //   title: "Titel",        ← Titel des Eintrags
    //   desc: "Beschreibung"   ← Kurze Erklärung (optional, "" lassen wenn nicht gewünscht)
    // },
    // ════════════════════════════════════════════════════════
    const ENTRIES = [
      {
        date: "07 Mar 2026",
        type: "new",
        title: "New Features",
        desc: "New Features that were Added are: Changelog, some more..."
      },
    ];
    // ════════════════════════════════════════════════════════

    const tagLabels = {
      new: '+ New',
      changed: '~ Changed',
      maintenance: '⚙ Maintenance',
      offline: '⚫ Offline',
      removed: '− Removed',
      security: '⚑ Security'
    };

    const container = document.getElementById('entries');
    ENTRIES.forEach((e, i) => {
      const el = document.createElement('div');
      el.className = 'entry';
      el.style.animationDelay = (i * 0.07) + 's';
      el.innerHTML = `
        <div class="entry-date">${e.date}</div>
        <div class="entry-content">
          <span class="entry-tag ${e.type}">${tagLabels[e.type] || e.type}</span>
          <div class="entry-title">${e.title}</div>
          ${e.desc ? `<div class="entry-desc">${e.desc}</div>` : ''}
        </div>
      `;
      container.appendChild(el);
    });

    // Stars bg
    const bg = document.getElementById('bg');
    const bgCtx = bg.getContext('2d');
    let bW, bH, stars = [];
    function resizeBg() { bW = bg.width = window.innerWidth; bH = bg.height = window.innerHeight; }
    resizeBg(); window.addEventListener('resize', resizeBg);
    for (let i = 0; i < 160; i++) stars.push({
      x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
      r: Math.random()*0.7+0.1, opacity: Math.random()*0.4+0.08, twinkle: Math.random()*Math.PI*2
    });
    function drawStars() {
      bgCtx.clearRect(0,0,bW,bH);
      stars.forEach(s => {
        s.twinkle += 0.012;
        const op = s.opacity*(0.6+0.4*Math.sin(s.twinkle));
        bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
        bgCtx.fillStyle=`rgba(200,198,220,${op})`; bgCtx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // Clock UK
    function tick() {
      const timeStr = new Intl.DateTimeFormat('en-GB', {
        timeZone:'Europe/London', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
      }).format(new Date());
      document.getElementById('clock').textContent = timeStr + ' UK';
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
