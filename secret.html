<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secret — Max</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #04040a;
      --grey-mid: #4a4a5a;
      --grey-light: #2a2a38;
      --white: #e8e6f0;
      --accent: #9090b0;
      --display: 'Cinzel', serif;
      --mono: 'DM Mono', monospace;
    }
    html, body { height: 100%; background: var(--black); color: var(--white); font-family: var(--mono); overflow: hidden; }

    #bg { position: fixed; inset: 0; z-index: 0; }
    .center-glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(80,70,140,0.14) 0%, transparent 70%);
      pointer-events: none; z-index: 2;
      animation: glowBreath 5s ease-in-out infinite;
    }
    @keyframes glowBreath {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.6; }
      50%      { transform: translate(-50%,-50%) scale(1.2); opacity:1; }
    }
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(4,4,10,0.97) 100%);
    }
    .line-top, .line-bottom {
      position: fixed; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--grey-light), transparent);
      z-index: 10; opacity: 0; animation: fadeIn 1s ease 0.5s forwards;
    }
    .line-top { top: 4rem; } .line-bottom { bottom: 4rem; }

    .corner {
      position: fixed; font-size: 0.55rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--grey-light); z-index: 10;
      opacity: 0; animation: fadeIn 1s ease 1.2s forwards;
    }
    .corner.tr { top: 1.6rem; right: 1.8rem; }
    .corner.bl { bottom: 1.6rem; left: 1.8rem; }
    .corner.br { bottom: 1.6rem; right: 1.8rem; }
    #clock { color: var(--grey-mid); }

    /* INTRO SCREEN */
    #intro {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 0;
    }
    .symbol {
      font-size: 2.5rem; margin-bottom: 2rem;
      opacity: 0; animation: fadeIn 1s ease 0.3s forwards, symbolFloat 4s ease-in-out 1.3s infinite;
      filter: drop-shadow(0 0 14px rgba(140,130,200,0.6));
    }
    @keyframes symbolFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .eyebrow {
      font-size: 0.58rem; letter-spacing: 0.36em; text-transform: uppercase;
      color: var(--grey-mid); margin-bottom: 1.8rem;
      opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
    }
    #intro h1 {
      font-family: var(--display);
      font-size: clamp(2.5rem, 8vw, 7rem);
      font-weight: 900; line-height: 1.1; letter-spacing: 0.1em;
      color: var(--white);
      text-shadow: 0 0 30px rgba(140,130,200,0.5), 0 0 80px rgba(140,130,200,0.2);
      opacity: 0; animation: fadeUp 1s ease 0.65s forwards;
    }
    .ornament {
      display: flex; align-items: center; gap: 1rem;
      margin: 2rem 0; opacity: 0; animation: fadeIn 1s ease 0.9s forwards;
    }
    .ornament-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--grey-mid)); }
    .ornament-line.right { background: linear-gradient(90deg, var(--grey-mid), transparent); }
    .ornament-diamond { width: 5px; height: 5px; background: var(--accent); transform: rotate(45deg); box-shadow: 0 0 8px var(--accent); }
    .subtitle {
      font-size: 0.75rem; color: var(--grey-mid); letter-spacing: 0.08em;
      max-width: 340px; line-height: 2;
      opacity: 0; animation: fadeUp 0.9s ease 1s forwards;
    }
    .enter-btn {
      margin-top: 2.5rem;
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--grey-mid);
      border: 1px solid var(--grey-light); padding: 0.6rem 2rem;
      border-radius: 2px; cursor: pointer; background: transparent;
      transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
      opacity: 0; animation: fadeIn 0.8s ease 1.2s forwards;
    }
    .enter-btn:hover { color: var(--white); border-color: var(--accent); box-shadow: 0 0 16px rgba(140,130,200,0.25); }

    /* VIDEO SCREEN */
    #video-screen {
      position: fixed; inset: 0; z-index: 200;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #video-screen iframe {
      width: 100vw; height: 100vh;
      border: none;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="center-glow"></div>
  <div class="vignette"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <span class="corner tr" id="clock">--:--:--</span>
  <span class="corner bl">Max — Secret</span>
  <span class="corner br">◈ Enter if you dare</span>

  <div id="intro">
  </div>

  <div id="video-screen">
    <iframe id="yt" src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&loop=1&playlist=dQw4w9WgXcQ" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <script>
    // Clock Berlin
    function tick() {
      const timeStr = new Intl.DateTimeFormat('de-DE', {
        timeZone: 'Europe/Berlin',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(new Date());
      document.getElementById('clock').textContent = timeStr + ' DE';
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
